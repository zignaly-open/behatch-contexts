name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions: {}

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@fcafdd6392932010c2bd5094439b8e33be2a8a09 # v2.37.0
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2
          ini-values: error_reporting=-1, display_errors=On

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Cache composer
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('**/composer.json') }}
          restore-keys: composer-${{ runner.os }}-php${{ matrix.php }}-

      - name: Update dependencies
        # No composer.lock is committed (library convention). `composer update`
        # resolves fresh each run; composer audit below catches CVEs.
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Security audit
        run: composer audit --no-interaction

      - name: Run atoum
        run: vendor/bin/atoum -d tests/units --fail-if-no-tests
